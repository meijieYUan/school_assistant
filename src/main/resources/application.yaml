spring:
  application:
    name: sprin_ai_SchoolAssistant
  ai:
    openai:
      api-key: ${CHAT_API_KEY}
      chat:
        base-url: https://ark.cn-beijing.volces.com/api
        options:
          model: ep-20260331234749-ft2fp
      embedding:
        base-url: https://dashscope.aliyuncs.com/compatible-mode
        api-key: ${DASHSCOPE_API_KEY}
        options:
          model: text-embedding-v4
          dimensions: 1024
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    vectorstore:
      qdrant:
        host: 127.0.0.1
        port: 6334
        initialize-schema: true
        collection-name: school_assistant

  datasource:
    url:  jdbc:mysql://localhost:3306/school_assistant
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
server:
  port: 8080
logging:
  level:
    org.springframework.ai: debug
    com.itajay.spring_ai_schoolassistant: debug
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:/mapper/*.xml
news:
  api:
    key: ${NEWS_API_KEY}
    base-url: https://newsapi.org/v2